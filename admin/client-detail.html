<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Detail — AgencyPay Admin</title>
  <meta name="description" content="Client profile, payment history, and billing actions.">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .modal-overlay {
      display: none !important;
    }
    .modal-overlay.open {
      display: flex !important;
      position: fixed !important;
      top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      width: 100vw !important; height: 100vh !important;
      background: rgba(15, 23, 42, 0.8) !important;
      z-index: 999999 !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 16px !important;
    }
    .modal-overlay.open .modal {
      display: block !important;
      background: #ffffff !important;
      color: #0f172a !important;
      opacity: 1 !important;
      visibility: visible !important;
      z-index: 1000000 !important;
      position: relative !important;
      margin: auto !important;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
      border: 1px solid #cbd5e1 !important;
      border-radius: 16px !important;
      width: 100% !important;
      max-width: 580px !important;
      max-height: 88vh !important;
      overflow-y: auto !important;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-6);
      background: linear-gradient(135deg, var(--color-brand-600), var(--color-brand-800));
      border-radius: var(--radius-lg);
      color: #fff;
      margin-bottom: var(--space-6);
    }
    .profile-avatar {
      width: 60px; height: 60px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem; font-weight: 800; flex-shrink: 0;
      border: 3px solid rgba(255,255,255,0.4);
    }
    .profile-name { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; }
    .profile-meta { font-size: 0.875rem; opacity: 0.8; margin-top: 2px; }
    .profile-meta a { color: rgba(255,255,255,0.85); }
    .profile-meta a:hover { color: #fff; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    .info-block {
      background: var(--color-gray-50);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      border: 1px solid var(--color-gray-200);
    }
    .info-label { font-size: 0.75rem; font-weight: 600; color: var(--color-gray-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .info-value { font-size: 1rem; font-weight: 600; color: var(--color-gray-900); }

    .action-bar {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-6);
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-4">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <div>
          <div class="topbar-title" id="page-title">Client Detail</div>
          <div class="topbar-subtitle"><a href="clients.html">← Back to Clients</a></div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-success btn-sm" onclick="UI.openModal('payment-modal')">
          💰 <span>Mark Payment Received</span>
        </button>
      </div>
    </header>

    <main class="page-content" id="main-content">
      <div class="page-loader"><div class="loader"></div></div>
    </main>
  </div>
</div>

<!-- ── Mark Payment Received Modal ─────────────────────────── -->
<div class="modal-overlay" id="payment-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>💰 Mark Payment Received</h3>
      <button class="modal-close" onclick="UI.closeModal('payment-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="flex flex-col gap-4">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Amount (₹) <span class="required">*</span></label>
            <input type="number" id="p-amount" class="form-input" placeholder="1000" min="1" required>
          </div>
          <div class="form-group">
            <label class="form-label">Payment Date <span class="required">*</span></label>
            <input type="date" id="p-date" class="form-input" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Payment Mode</label>
          <select id="p-mode" class="form-select">
            <option value="UPI">📱 UPI</option>
            <option value="Bank Transfer">🏦 Bank Transfer</option>
            <option value="Cash">💵 Cash</option>
            <option value="Razorpay">💳 Razorpay</option>
            <option value="Other">💰 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Reference / Note</label>
          <input type="text" id="p-note" class="form-input" placeholder="UTR number, transaction ID, or any note">
        </div>
        <div style="background:var(--color-success-50); border:1px solid var(--color-success-100); border-radius:var(--radius-md); padding:12px; font-size:0.875rem; color:var(--color-success-700)">
          ✅ On save: next due date will be recalculated and a confirmation will be sent to the client.
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="UI.closeModal('payment-modal')">Cancel</button>
      <button class="btn btn-success" id="save-payment-btn" onclick="savePayment()" data-loading-text="Saving…">
        Confirm Payment
      </button>
    </div>
  </div>
</div>

<!-- ── Send Reminder Modal ──────────────────────────────────── -->
<div class="modal-overlay" id="reminder-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3>📨 Send Reminder</h3>
      <button class="modal-close" onclick="UI.closeModal('reminder-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="flex flex-col gap-4">
        <div class="form-group">
          <label class="form-label">Message Type</label>
          <select id="r-type" class="form-select">
            <option value="upcoming_due">Upcoming Due Reminder</option>
            <option value="due_today">Due Today</option>
            <option value="overdue">Overdue Notice</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Channel</label>
          <select id="r-channel" class="form-select">
            <option value="both">Email + WhatsApp</option>
            <option value="email">Email Only</option>
            <option value="whatsapp">WhatsApp Only</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="UI.closeModal('reminder-modal')">Cancel</button>
      <button class="btn btn-primary" id="send-reminder-btn" onclick="sendReminder()" data-loading-text="Sending…">
        Send Now
      </button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script>
  let clientId = null;
  let currentClient = null;

  (async () => {
    if (!await Auth.requireAuth('admin')) return;

    clientId = new URLSearchParams(location.search).get('id');
    if (!clientId) { location.href = 'clients.html'; return; }

    fetch('_sidebar.html').then(r => r.text()).then(html => {
      document.getElementById('sidebar-mount').innerHTML = html;
      document.getElementById('nav-clients').classList.add('active');
      document.getElementById('mnav-clients')?.classList.add('active');
      document.getElementById('admin-name').textContent = Auth.getName();
      document.getElementById('admin-avatar').textContent = UI.initials(Auth.getName());
    });

    const pDateInput = document.getElementById('p-date');
    if (pDateInput) pDateInput.value = new Date().toISOString().slice(0, 10);

    loadClient();
  })();

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }

  let currentSubscription = null;
  let clientSubscriptions = [];

  async function loadClient() {
    try {
      const data = await API.clients.get(clientId);
      currentClient = data;
      document.getElementById('page-title').textContent = data.business_name;
      document.getElementById('p-amount').value = data.monthly_amount;
      
      try {
        clientSubscriptions = await API.subscriptions.listForClient(clientId);
        currentSubscription = clientSubscriptions[0] || null;
      } catch (e) {
        console.warn('Subscriptions list note:', e);
      }

      renderPage(data);
    } catch (err) {
      document.getElementById('main-content').innerHTML =
        `<div class="empty-state"><p>Error loading client: ${err.message}</p></div>`;
    }
  }

  function renderPage(c) {
    const billingStatus = c.billing_status || 'current';
    const sub = currentSubscription;

    document.getElementById('main-content').innerHTML = `
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-header-main">
          <div class="profile-avatar">${UI.initials(c.business_name)}</div>
          <div style="flex:1; min-width:0;">
            <div class="profile-name">${c.business_name}</div>
            <div class="profile-meta">
              ${c.website_url ? `<a href="${c.website_url}" target="_blank">🔗 ${c.website_url.replace(/^https?:\/\//, '')}</a> &nbsp;·&nbsp; ` : ''}
              ${c.email} ${c.whatsapp_number ? `&nbsp;·&nbsp; ${c.whatsapp_number}` : ''}
            </div>
            <div style="margin-top:6px">${UI.statusBadge(c.status !== 'active' ? c.status : billingStatus)}</div>
          </div>
        </div>
        <div class="profile-due-box">
          <div>
            <div style="opacity:0.75; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em;">Next Due</div>
            <div class="due-date" style="font-family:var(--font-display); font-size:1.35rem; font-weight:800">${UI.formatDate(c.next_due_date)}</div>
          </div>
          <div style="text-align:right;">
            <div style="opacity:0.75; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em;">Amount</div>
            <div class="due-amount" style="font-size:1.2rem; font-weight:700;">${UI.formatRupees(c.monthly_amount)} <span style="font-size:0.8rem; font-weight:400; opacity:0.85">/ ${c.billing_cycle === 'yearly' ? 'yr' : 'mo'}</span></div>
          </div>
        </div>
      </div>

      <!-- Complete 10 Admin Actions Bar -->
      <div class="action-bar" style="background:#ffffff; border:1px solid var(--color-gray-200); border-radius:var(--radius-lg); padding:var(--space-4);">
        <div style="width:100%; font-size:0.75rem; font-weight:700; text-transform:uppercase; color:var(--color-gray-500); margin-bottom:4px;">⚡ Admin Actions Suite</div>
        
        <button class="btn btn-success" onclick="UI.openModal('payment-modal')">💰 Mark Paid</button>
        <button class="btn btn-primary" onclick="adminAction('generateInvoice')">📄 Generate Invoice</button>
        <button class="btn btn-secondary" onclick="adminAction('approvePayment')">✅ Approve Payment</button>
        <button class="btn btn-secondary" onclick="adminAction('rejectPayment')">❌ Reject Payment</button>
        <button class="btn btn-secondary" onclick="adminAction('regenerateQR')">⚡ Regenerate QR</button>
        <button class="btn btn-secondary" onclick="adminAction('resendInvoice')">📨 Resend Invoice</button>
        <button class="btn btn-secondary" onclick="adminAction('resendReminder')">🔔 Resend Reminder</button>
        ${c.status === 'paused' 
          ? `<button class="btn btn-secondary" onclick="adminAction('resumeSubscription')">▶️ Resume Subscription</button>`
          : `<button class="btn btn-secondary" onclick="adminAction('pauseSubscription')">⏸️ Pause Subscription</button>`
        }
        <button class="btn btn-danger" onclick="adminAction('cancelSubscription')">🚫 Cancel Subscription</button>
        
        <a href="../client/dashboard.html?client_id=${c.id}" target="_blank" class="btn btn-secondary">👁️ View Client Portal</a>
      </div>

      ${sub ? `
      <!-- Active Subscription & QR Code Preview Card -->
      <div class="card" style="margin-bottom: var(--space-6); background: #ffffff; border: 1px solid var(--color-gray-200); border-radius: var(--radius-lg); padding: var(--space-6);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <h3 style="font-size:1.1rem; font-weight:800; margin:0;">🎯 Active Subscription QR & Invoice</h3>
          <div>${UI.statusBadge(sub.payment_status)}</div>
        </div>

        <div class="detail-qr-grid" style="display:grid; gap: var(--space-5); align-items:center;">
          <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:var(--radius-md); padding:10px; text-align:center;">
            <img src="${sub.qr_image}" style="width:150px; height:150px; display:block; margin:auto;" />
            <div style="font-size:0.75rem; color:var(--color-gray-500); margin-top:6px;">Fresh Dynamic QR</div>
          </div>

          <div class="detail-meta-grid" style="display:grid; gap:12px; font-size:0.875rem;">
            <div>
              <span style="color:var(--color-gray-500); font-size:0.75rem; text-transform:uppercase;">Invoice Number</span>
              <div style="font-weight:700; font-family:monospace;">${sub.invoice_number}</div>
            </div>
            <div>
              <span style="color:var(--color-gray-500); font-size:0.75rem; text-transform:uppercase;">Reference Number</span>
              <div style="font-weight:700; font-family:monospace; color:var(--color-brand-600);">${sub.reference_number}</div>
            </div>
            <div>
              <span style="color:var(--color-gray-500); font-size:0.75rem; text-transform:uppercase;">Merchant Name</span>
              <div style="font-weight:600;">${CONFIG.AGENCY_NAME}</div>
            </div>
            <div>
              <span style="color:var(--color-gray-500); font-size:0.75rem; text-transform:uppercase;">Merchant UPI ID</span>
              <div style="font-weight:600; font-family:monospace;">${CONFIG.ADMIN_UPI_ID}</div>
            </div>
            <div>
              <span style="color:var(--color-gray-500); font-size:0.75rem; text-transform:uppercase;">Amount</span>
              <div style="font-weight:800; color:var(--color-success-600);">${UI.formatRupees(sub.monthly_amount)}</div>
            </div>
            <div>
              <span style="color:var(--color-gray-500); font-size:0.75rem; text-transform:uppercase;">Due Date</span>
              <div style="font-weight:600;">${UI.formatDate(sub.due_date)}</div>
            </div>
          </div>
        </div>
      </div>
      ` : ''}

      <!-- Info Grid -->
      <div class="info-grid">
        <div class="info-block">
          <div class="info-label">Contact Person</div>
          <div class="info-value">${c.contact_person || '—'}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Subscription Start</div>
          <div class="info-value">${UI.formatDate(c.subscription_start_date)}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Last Paid</div>
          <div class="info-value">${c.last_paid_date ? UI.formatDate(c.last_paid_date) : 'Never'}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Email</div>
          <div class="info-value">
            <a href="#" onclick="event.preventDefault(); UI.openCommunicationUrl(UI.getEmailUrl('${c.email}', 'Billing Notification', ''))" style="color:var(--color-brand-600);">✉️ ${c.email}</a>
          </div>
        </div>
        <div class="info-block">
          <div class="info-label">WhatsApp</div>
          <div class="info-value">
            ${c.whatsapp_number ? `<a href="#" onclick="event.preventDefault(); UI.openCommunicationUrl(UI.getWhatsAppUrl('${c.whatsapp_number}', 'Hi ${c.business_name},'))" style="color:var(--color-brand-600);">💬 ${c.whatsapp_number}</a>` : '—'}
          </div>
        </div>
      </div>

      <!-- Subscriptions & Invoices Table -->
      <div class="card" style="padding:0; margin-bottom: var(--space-6)">
        <div class="card-header" style="padding: var(--space-5) var(--space-6) var(--space-4)">
          <span class="card-title">🧾 Generated Invoices & QR Subscriptions</span>
          <span style="font-size:0.8125rem; color:var(--color-gray-500)">${clientSubscriptions.length} invoice${clientSubscriptions.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="table-wrapper">
          ${renderSubscriptionsTable(clientSubscriptions)}
        </div>
      </div>

      <!-- Payment History -->
      <div class="card" style="padding:0; margin-bottom: var(--space-6)">
        <div class="card-header" style="padding: var(--space-5) var(--space-6) var(--space-4)">
          <span class="card-title">💳 Payment Receipts History</span>
          <span style="font-size:0.8125rem; color:var(--color-gray-500)">${c.payments?.length || 0} payment${c.payments?.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="table-wrapper">
          ${renderPaymentTable(c.payments)}
        </div>
      </div>
    `;
  }

  function renderSubscriptionsTable(subs) {
    if (!subs || !subs.length) {
      return `<div class="empty-state" style="padding: var(--space-8)">
        <div class="empty-icon">📄</div>
        <h3>No subscription invoices generated yet</h3>
        <p>Click "Generate Invoice" above to create a dynamic UPI QR invoice.</p>
      </div>`;
    }

    const rows = subs.map(s => `
      <tr>
        <td style="font-family:monospace; font-weight:700;">${s.invoice_number}</td>
        <td style="font-family:monospace; color:var(--color-brand-600);">${s.reference_number}</td>
        <td style="font-weight:700;">${UI.formatRupees(s.monthly_amount)}</td>
        <td>${UI.formatDate(s.due_date)}</td>
        <td>${UI.statusBadge(s.payment_status)}</td>
        <td>
          <div style="display:flex; gap:4px; flex-wrap:wrap;">
            <button class="btn btn-secondary btn-sm" onclick="adminAction('approvePayment', '${s.id}')">Approve</button>
            <button class="btn btn-secondary btn-sm" onclick="adminAction('rejectPayment', '${s.id}')">Reject</button>
            <button class="btn btn-secondary btn-sm" onclick="adminAction('regenerateQR', '${s.id}')">QR</button>
            <button class="btn btn-secondary btn-sm" onclick="adminAction('resendInvoice', '${s.id}')">Resend</button>
          </div>
        </td>
      </tr>
    `).join('');

    return `<table>
      <thead><tr>
        <th>Invoice No</th><th>Ref No</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function renderPaymentTable(payments) {
    if (!payments || !payments.length) {
      return `<div class="empty-state" style="padding: var(--space-8)">
        <div class="empty-icon">💳</div>
        <h3>No payments recorded yet</h3>
        <p>Use "Mark Payment Received" or "Approve Payment" when the client pays.</p>
      </div>`;
    }
    const rows = payments.map(p => `
      <tr>
        <td>${UI.formatDate(p.payment_date)}</td>
        <td style="font-weight:700; color:var(--color-gray-900)">${UI.formatRupees(p.amount)}</td>
        <td>${UI.paymentModeIcon(p.payment_mode)}</td>
        <td style="color:var(--color-gray-500); font-size:0.875rem">${p.reference_note || '—'}</td>
        <td><span class="badge badge-current"><span class="badge-dot"></span>Received</span></td>
      </tr>
    `).join('');
    return `<table>
      <thead><tr>
        <th>Date</th><th>Amount</th><th>Mode</th><th>Reference</th><th>Status</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  async function adminAction(actionType, targetId = null) {
    try {
      let subId = targetId || currentSubscription?.id;
      
      // Auto-generate invoice on-the-fly if action requires an invoice and none exists yet
      if (!subId && ['approvePayment', 'rejectPayment', 'regenerateQR', 'resendInvoice', 'markPaid'].includes(actionType)) {
        UI.toast('Creating subscription invoice for client…', 'default');
        const freshSub = await API.subscriptions.generateInvoiceAction(clientId);
        currentSubscription = freshSub;
        subId = freshSub.id;
      }

      let res;
      if (actionType === 'generateInvoice') {
        res = await API.subscriptions.generateInvoiceAction(clientId);
        currentSubscription = res;
        UI.toast(`Generated Invoice ${res.invoice_number} (Ref: ${res.reference_number})`, 'success');

      } else if (actionType === 'regenerateQR') {
        res = await API.subscriptions.regenerateQR(subId);
        currentSubscription = res;
        UI.toast('Fresh UPI QR Code generated!', 'success');

      } else if (actionType === 'approvePayment' || actionType === 'markPaid') {
        res = await API.subscriptions.approvePayment(subId);
        UI.toast(`Invoice ${res.invoice_number || ''} marked as PAID!`, 'success');

      } else if (actionType === 'rejectPayment') {
        const reason = prompt('Enter rejection reason:', 'Payment verification failed');
        if (reason === null) return;
        res = await API.subscriptions.rejectPayment(subId, reason);
        UI.toast(`Invoice ${res.invoice_number || ''} marked as REJECTED`, 'warning');

      } else if (actionType === 'resendInvoice') {
        res = await API.subscriptions.resendInvoice(subId);
        UI.toast('Invoice notification dispatched!', 'success');
        if (res.waUrl) UI.openCommunicationUrl(res.waUrl);
        if (res.emailUrl) UI.openCommunicationUrl(res.emailUrl);

      } else if (actionType === 'resendReminder') {
        res = await API.subscriptions.resendReminder(clientId);
        UI.toast('Reminder notification dispatched!', 'success');
        if (res.waUrl) UI.openCommunicationUrl(res.waUrl);
        if (res.emailUrl) UI.openCommunicationUrl(res.emailUrl);

      } else if (actionType === 'pauseSubscription') {
        res = await API.subscriptions.pauseSubscription(clientId);
        UI.toast('Subscription PAUSED', 'warning');

      } else if (actionType === 'resumeSubscription') {
        res = await API.subscriptions.resumeSubscription(clientId);
        UI.toast('Subscription RESUMED (Active)', 'success');

      } else if (actionType === 'cancelSubscription') {
        if (!confirm('Are you sure you want to CANCEL this subscription?')) return;
        res = await API.subscriptions.cancelSubscription(clientId);
        UI.toast('Subscription CANCELLED', 'error');
      }

      await loadClient();
    } catch (err) {
      console.error('Admin Action Error:', err);
      UI.toast('Action Note: ' + err.message, 'warning');
    }
  }

  async function savePayment() {
    const btn = document.getElementById('save-payment-btn');
    const amount = parseFloat(document.getElementById('p-amount').value);
    const date   = document.getElementById('p-date').value;
    const mode   = document.getElementById('p-mode').value;
    const note   = document.getElementById('p-note').value.trim();

    if (!amount || !date) { UI.toast('Amount and date are required', 'error'); return; }

    UI.setLoading(btn, true);
    try {
      const result = await API.payments.markReceived({
        client_id: clientId, amount, payment_date: date, payment_mode: mode, reference_note: note || null,
      });
      UI.toast('Payment recorded! Next due: ' + UI.formatDate(result.next_due_date), 'success');
      UI.closeModal('payment-modal');
      loadClient();
    } catch (err) {
      UI.toast('Error: ' + err.message, 'error');
    } finally {
      UI.setLoading(btn, false);
    }
  }

  async function sendReminder() {
    const btn = document.getElementById('send-reminder-btn');
    const type = document.getElementById('r-type').value;
    const channel = document.getElementById('r-channel').value;
    UI.setLoading(btn, true);
    try {
      const res = await API.notifications.send(clientId, type, channel);
      UI.toast('Reminder logged successfully!', 'success');
      UI.closeModal('reminder-modal');

      if (res.waUrl) {
        UI.openCommunicationUrl(res.waUrl);
      }
      if (res.emailUrl || res.gmailUrl) {
        UI.openCommunicationUrl(res.emailUrl || res.gmailUrl);
      }
    } catch (err) {
      UI.toast('Error: ' + err.message, 'error');
    } finally {
      UI.setLoading(btn, false);
    }
  }

  async function togglePause(id, currentStatus) {
    const newStatus = currentStatus === 'paused' ? 'active' : 'paused';
    try {
      await API.clients.updateStatus(id, newStatus);
      UI.toast(`Client ${newStatus === 'active' ? 'reactivated' : 'paused'}`, 'success');
      loadClient();
    } catch (err) {
      UI.toast('Error: ' + err.message, 'error');
    }
  }

  async function sendPasswordSetupLink(id) {
    try {
      const res = await API.clients.sendPasswordSetLink(id);
      UI.toast(`Password setup link sent to ${res.email}!`, 'success');
      if (res.waUrl) {
        UI.openCommunicationUrl(res.waUrl);
      }
      if (res.emailUrl) {
        UI.openCommunicationUrl(res.emailUrl);
      }
    } catch (err) {
      UI.toast('Error sending setup link: ' + err.message, 'error');
    }
  }
</script>
</body>
</html>
