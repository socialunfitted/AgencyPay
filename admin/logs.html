<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Logs — AgencyPay Admin</title>
  <meta name="description" content="Complete log of all email and WhatsApp notifications sent.">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <header class="topbar">
      <div class="flex items-center gap-4">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <div>
          <div class="topbar-title">Notification Logs</div>
          <div class="topbar-subtitle" id="log-count">Loading…</div>
        </div>
      </div>
    </header>

    <main class="page-content">
      <!-- Filter Bar -->
      <div class="card" style="padding: var(--space-4); margin-bottom: var(--space-5)">
        <div class="filter-bar">
          <select class="form-select" id="f-channel" onchange="loadLogs()" style="width:150px">
            <option value="">All Channels</option>
            <option value="email">📧 Email</option>
            <option value="whatsapp">💬 WhatsApp</option>
          </select>
          <select class="form-select" id="f-type" onchange="loadLogs()" style="width:180px">
            <option value="">All Types</option>
            <option value="upcoming_due">Upcoming Due</option>
            <option value="due_today">Due Today</option>
            <option value="overdue">Overdue</option>
            <option value="payment_received">Payment Received</option>
          </select>
          <select class="form-select" id="f-status" onchange="loadLogs()" style="width:140px">
            <option value="">All Status</option>
            <option value="sent">✅ Sent</option>
            <option value="failed">❌ Failed</option>
          </select>
          <input type="date" class="form-input" id="f-date-from" onchange="loadLogs()" style="width:160px" title="From date">
          <input type="date" class="form-input" id="f-date-to" onchange="loadLogs()" style="width:160px" title="To date">
          <button class="btn btn-secondary btn-sm" onclick="clearFilters()">Clear</button>
        </div>
      </div>

      <!-- Logs Table -->
      <div class="card" style="padding:0">
        <div class="table-wrapper" id="logs-table-wrapper">
          <div class="page-loader"><div class="loader"></div></div>
        </div>
        <div id="pagination-controls" class="pagination"></div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script>
  Auth.requireAuth('admin');

  fetch('_sidebar.html').then(r => r.text()).then(html => {
    document.getElementById('sidebar-mount').innerHTML = html;
    document.getElementById('nav-logs').classList.add('active');
    document.getElementById('admin-name').textContent = Auth.getName();
    document.getElementById('admin-avatar').textContent = UI.initials(Auth.getName());
  });

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }

  let currentPage = 1;

  const typeLabels = {
    upcoming_due: '⏰ Upcoming Due',
    due_today: '📅 Due Today',
    overdue: '🔴 Overdue',
    payment_received: '✅ Payment Received',
  };

  async function loadLogs(page = 1) {
    currentPage = page;
    const params = { page, page_size: 50 };
    const channel = document.getElementById('f-channel').value;
    const type    = document.getElementById('f-type').value;
    const status  = document.getElementById('f-status').value;
    const from    = document.getElementById('f-date-from').value;
    const to      = document.getElementById('f-date-to').value;

    if (channel) params.channel = channel;
    if (type)    params.type = type;
    if (status)  params.status = status;
    if (from)    params.date_from = from;
    if (to)      params.date_to = to;

    const wrapper = document.getElementById('logs-table-wrapper');
    wrapper.innerHTML = `<div class="page-loader"><div class="loader"></div></div>`;

    try {
      const data = await API.logs.list(params);
      document.getElementById('log-count').textContent =
        `${data.total.toLocaleString()} log entr${data.total !== 1 ? 'ies' : 'y'}`;
      renderLogs(data);
    } catch (err) {
      wrapper.innerHTML = `<div class="empty-state"><p>Error: ${err.message}</p></div>`;
    }
  }

  function renderLogs(data) {
    const wrapper = document.getElementById('logs-table-wrapper');

    if (!data.data || !data.data.length) {
      wrapper.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📋</div>
        <h3>No logs found</h3>
        <p>Notifications will appear here once they are sent.</p>
      </div>`;
      document.getElementById('pagination-controls').innerHTML = '';
      return;
    }

    const rows = data.data.map(log => {
      const sentAt = new Date(log.sent_at);
      const dateStr = sentAt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
      const timeStr = sentAt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      const clientName = log.clients?.business_name || 'Unknown';
      const clientId = log.clients?.id;

      return `<tr>
        <td>
          <a href="client-detail.html?id=${clientId}" style="font-weight:600; color:var(--color-gray-900)">
            ${clientName}
          </a>
          <div style="font-size:0.75rem; color:var(--color-gray-400)">${log.clients?.email || ''}</div>
        </td>
        <td><span class="badge badge-${log.channel === 'email' ? 'due-soon' : 'active'}">
          ${log.channel === 'email' ? '📧' : '💬'} ${log.channel}
        </span></td>
        <td>${typeLabels[log.type] || log.type}</td>
        <td>
          <div>${dateStr}</div>
          <div style="font-size:0.75rem; color:var(--color-gray-400)">${timeStr}</div>
        </td>
        <td>
          <span class="badge badge-${log.status}">
            <span class="badge-dot"></span>${log.status}
          </span>
        </td>
        <td style="font-size:0.8125rem; color:var(--color-danger-600); max-width:200px; word-break:break-word">
          ${log.error_message || '—'}
        </td>
      </tr>`;
    }).join('');

    wrapper.innerHTML = `<table>
      <thead><tr>
        <th>Client</th>
        <th>Channel</th>
        <th>Type</th>
        <th>Sent At</th>
        <th>Status</th>
        <th>Error</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

    // Pagination
    renderPagination(data);
  }

  function renderPagination(data) {
    const ctrl = document.getElementById('pagination-controls');
    if (data.total_pages <= 1) { ctrl.innerHTML = ''; return; }

    let html = `<button class="pagination-btn" onclick="loadLogs(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>← Prev</button>`;
    for (let i = 1; i <= data.total_pages; i++) {
      if (Math.abs(i - currentPage) <= 2 || i === 1 || i === data.total_pages) {
        html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="loadLogs(${i})">${i}</button>`;
      } else if (Math.abs(i - currentPage) === 3) {
        html += `<span style="padding:0 4px;color:var(--color-gray-400)">…</span>`;
      }
    }
    html += `<button class="pagination-btn" onclick="loadLogs(${currentPage + 1})" ${currentPage >= data.total_pages ? 'disabled' : ''}>Next →</button>`;
    ctrl.innerHTML = html;
  }

  function clearFilters() {
    ['f-channel', 'f-type', 'f-status'].forEach(id => document.getElementById(id).value = '');
    ['f-date-from', 'f-date-to'].forEach(id => document.getElementById(id).value = '');
    loadLogs(1);
  }

  loadLogs();
</script>
</body>
</html>
