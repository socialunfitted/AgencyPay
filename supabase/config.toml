# Supabase project identifier
project_id = "YOUR_PROJECT_REF"

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323
api_url = "http://localhost"

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://YOUR_DOMAIN.com"]
jwt_expiry = 86400

[auth.email]
enable_signup = false   # No public sign-up — Admin creates accounts only

[functions.auth-login]
verify_jwt = false     # This function handles its own JWT logic

[functions.admin-clients]
verify_jwt = false

[functions.admin-payments]
verify_jwt = false

[functions.admin-dashboard]
verify_jwt = false

[functions.admin-templates]
verify_jwt = false

[functions.admin-logs]
verify_jwt = false

[functions.client-portal]
verify_jwt = false

[functions.send-notification]
verify_jwt = false

[functions.daily-cron]
verify_jwt = false
